global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:3000"]
    metrics_path: /metrics

  - job_name: doctor-service
    static_configs:
      - targets: ["doctor-service:3001"]
    metrics_path: /metrics

  - job_name: hms-service
    static_configs:
      - targets: ["hms-service:3002"]
    metrics_path: /metrics

  - job_name: patient-service
    static_configs:
      - targets: ["patient-service:3003"]
    metrics_path: /metrics

  - job_name: student-service
    static_configs:
      - targets: ["student-service:3004"]
    metrics_path: /metrics

  - job_name: analytics-service
    static_configs:
      - targets: ["analytics-service:3005"]
    metrics_path: /metrics

  - job_name: voice-ai
    static_configs:
      - targets: ["voice-ai:8100"]
    metrics_path: /metrics
